<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking | The Residency Towers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">The Residency Towers</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="rooms.html">Rooms</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Booking</a></li>
      </ul>
    </nav>
  </header>
  <section class="booking">
    <h2>Book Your Stay</h2>
    <form class="booking-form" action="#success">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label for="room-type">Room Type</label>
      <select id="room-type" required>
        <option value="">Select a room</option>
        <option>AC Deluxe Room</option>
        <option>AC Executive Room</option>
        <option>Non-AC Standard Room</option>
        <option>Luxury Suite</option>
      </select>

      <label for="room-number">Room Number</label>
      <input type="text" id="room-number" placeholder="Enter room number" required>

      <button type="submit">Confirm Booking</button>
    </form>
    <div id="success" class="success-message">
       Your room booking is successful!  
      <a href="index.html" class="btn">Back to Home</a>
    </div>
  </section>
  <footer>
    <p>Trichy Road, karur | +91 8122849092</p>
  </footer>
</body>
</html>
